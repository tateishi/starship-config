# ~/.config/starship.toml

add_newline = true
#format = "$all$character"
format = """\
$battery$memory_usage$sudo$status$username$hostname$directory$git_branch$git_status\
$c\
$haskell\
$lisp\
$nodejs\
$python\
$rust\
$package\
$time\
$os\
${env_var.winver} \
${env_var.pwsh_kind}
$character"""

[sudo]
disabled = false

[status]
disabled = false
format = "[$symbol$common_meaning $int $signal_name$maybe_int]($style)"

[os]
disabled = false
format = " [$symbol$name]($style) "

[os.symbols]
Ubuntu = " "
Windows = " "

[username]
style_user = "bold green"
style_root = "bold red"
format = " [$user]($style) "
show_always = true

[hostname]
ssh_only = false
format = "  [$hostname](bold yellow) "

[directory]
# 省略（truncation）を無効化：パス要素を切らない
truncation_length = 0
truncation_symbol = ""

# Git リポジトリ単位での短縮を無効化（これが原因で「カレントだけ」っぽくなることがある）
truncate_to_repo = false

# fish 風の短縮を無効化（1文字化などを防ぐ）
fish_style_pwd_dir_length = 0

read_only = " "
home_symbol = "󰉋 ~"

style = "bold cyan"
# 見た目（必要なら）
format = "[$path]($style) "

[time]
disabled = false
format = " $time(blue bold)"
time_format = " %H:%M"

[battery]
disabled = false

[git_branch]
symbol = " "
style = "bold purple"
format = "[$symbol$branch]($style) "

[git_status]
style = "bold yellow"
format = "[$all_status$ahead_behind](style) "
conflicted = " "
ahead = "⇡${count}"
behind = "⇣${count}"
staged = "+${count}"
modified = "~${count}"
deleted = "×${count}"
untracked = "?${count}"

[character]
success_symbol = "❯"
error_symbol = "❯"

# PowerShell のバージョンを表示（色: 青太字）
[env_var.pwsh_version]
variable = "STARSHIP_POWERSHELL_VERSION"
# お好みでアイコンを変更（ は Nerd Font の PowerShell アイコン）
format = " PS $env_value "
style = "blue bold"
disabled = false

# 種別も表示（ps5 / ps7）。省略したい場合はこのブロックは不要。
[env_var.pwsh_kind]
variable = "STARSHIP_POWERSHELL_KIND"
format = " $env_value($style)"
disabled = false

# OS ファミリー（Windows 10 / 11）を表示
[env_var.winver]
variable = "STARSHIP_WINDOWS_FAMILY"
format = "$env_value($style)"
style = "bold magenta"
disabled = false
